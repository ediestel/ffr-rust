# cbindgen config for crates/ffr-c.
# Generate the C header from this crate with:
#   cbindgen --config crates/ffr-c/cbindgen.toml \
#            --crate ffr-c \
#            --output crates/ffr-c/include/ffr.h

language = "C"
include_guard = "FFR_H"
pragma_once = false
autogen_warning = "/* Generated by cbindgen — do not edit manually. */"
documentation = true
documentation_style = "c"
line_length = 100
tab_width = 4
style = "both"

cpp_compat = true
includes = []
sys_includes = ["stddef.h", "stdint.h"]
no_includes = false

[export]
prefix = "ffr_"
item_types = ["functions"]
include = ["ffr_free_string", "ffr_c_stat", "ffr_c_classify", "ffr_c_read_chunk", "ffr_c_read_lines", "ffr_c_version"]

[export.rename]
"usize" = "size_t"
"u64" = "uint64_t"

[parse]
parse_deps = false

[parse.expand]
crates = []
