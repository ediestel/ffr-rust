name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # MCP server binary, native runners only. Asset naming
  # `ffr-mcp-<target-triple>` (+ .sha256) matches ff-suite --prebuilt.
  build-mcp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mcp-${{ matrix.target }}
      - name: cargo build --release -p ffr-mcp
        run: cargo build --release -p ffr-mcp
      - name: stage and checksum
        run: |
          mkdir -p dist
          cp target/release/ffr-mcp "dist/ffr-mcp-${{ matrix.target }}"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "ffr-mcp-${{ matrix.target }}" > "ffr-mcp-${{ matrix.target }}.sha256"
          else
            shasum -a 256 "ffr-mcp-${{ matrix.target }}" > "ffr-mcp-${{ matrix.target }}.sha256"
          fi
      - name: smoke-test MCP handshake
        run: |
          req='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'
          echo "$req" | "dist/ffr-mcp-${{ matrix.target }}" | head -1 | grep -q '"result"'
      - uses: actions/upload-artifact@v4
        with:
          name: ffr-mcp-${{ matrix.target }}
          path: dist/

  build-binaries:
    # cross targets (musl/aarch64 on ubuntu) currently fail for lack of
    # cross linkers; publish runs with always() so native artifacts ship
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
            ext: dylib
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: dylib
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: so
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            ext: so
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            ext: so
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: dll
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            ext: dll
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: cargo build --release
        run: cargo build --release -p ffr-nvim -p ffr-c --target ${{ matrix.target }}
      - name: rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libffr_nvim.${{ matrix.ext }} dist/libffr_nvim-${{ matrix.target }}.${{ matrix.ext }} || true
          cp target/${{ matrix.target }}/release/libffr_c.${{ matrix.ext }} dist/libffr_c-${{ matrix.target }}.${{ matrix.ext }} || true
          ls dist/
      - uses: actions/upload-artifact@v4
        with:
          name: ffr-${{ matrix.target }}
          path: dist/

  publish:
    needs: [build-binaries, build-mcp]
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
