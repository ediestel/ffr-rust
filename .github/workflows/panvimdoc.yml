name: panvimdoc

on:
  push:
    branches: [main]
    paths: ['README.md']
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: kdheepak/panvimdoc@main
        with:
          vimdoc: ffr
          version: 'Neovim >= 0.10.0'
          description: 'Fast file reader for Neovim & AI agents'
          toc: true
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs(vimdoc): auto-generate from README'
          file_pattern: doc/ffr.txt
