name: stylua

on:
  push:
    branches: [main]
    paths: ['lua/**', 'tests/**', '.stylua.toml']
  pull_request:
    branches: [main]
    paths: ['lua/**', 'tests/**', '.stylua.toml']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/
